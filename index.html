<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fuck, Marry, Kill</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e63946;
    --pink: #ff4d6d;
    --dark: #0d0d0d;
    --card-bg: #ffffff;
    --gold: #ffd60a;
    --white: #ffffff;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background-color: #ffffff;
    color: #000000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .screen.hidden { display: none; }

  /* ── HOME SCREEN ── */
  #home-screen {
    gap: 75px;
    text-align: center;
  }

  .home-deco {
    font-size: 56px;
    line-height: 1;
  }

  .home-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 16vw, 80px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: #000000;
  }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 3px;
    padding: 16px 56px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: none; }

  .btn-primary {
    background: linear-gradient(135deg, var(--red), var(--pink));
    color: #ffffff;
    box-shadow: none;
  }

  .btn-primary:hover {
    box-shadow: none;
  }

  .btn-next {
    background: linear-gradient(135deg, var(--red), var(--pink));
    color: #ffffff;
    box-shadow: none;
    font-size: 26px;
    padding: 14px 48px;
    margin-top: 8px;
  }

  .btn-next:hover {
    box-shadow: none;
  }

  /* ── GAME SCREEN ── */
  #game-screen {
    gap: 16px;
    justify-content: center;
    padding-top: 45px;
    padding-bottom: 45px;
  }

  .game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 45px;
    letter-spacing: 2px;
    color: #000000;
    text-align: center;
  }

  /* ── CARD GRID ── */
  .card-grid {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 4px;
  }

  .card-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .card-row.single { justify-content: center; }

  /* top row: 2 cards side by side */
  .card-row.double .card { width: calc(45% - 6px); }

  /* bottom row: 1 card centered, same width as one top card */
  .card-row.single .card { width: calc(45% - 6px); }

  .card {
    background: transparent;
    border-radius: 0;
    overflow: visible;
    border: none;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card-img-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: #ddd;
    flex-shrink: 0;
    border: 5px solid #000000;
    border-radius: 10px;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .card-name {
    padding: 6px 4px 0;
    text-align: center;
    line-height: 1.25;
    width: 100%;
  }

  .card-name .name-main {
    font-weight: 900;
    font-size: clamp(11px, 3.5vw, 15px);
    color: #000000;
    display: block;
  }

  .card-name .name-sub {
    font-size: clamp(9px, 2.8vw, 12px);
    color: rgba(0,0,0,0.5);
    display: block;
    margin-top: 2px;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════ HOME ═══════════════════════════ -->
<div class="screen" id="home-screen">
  <div>
    <h1 class="home-title">Fuck,<br>Marry,<br>Kill</h1>
  </div>
  <button class="btn btn-primary" onclick="startGame()">START</button>
</div>

<!-- ═══════════════════════════ GAME ═══════════════════════════ -->

        <div class="card-name"><span class="name-main" id="name-main-0"></span><span class="name-sub" id="name-sub-0"></span></div>
      </div>
      <div class="card" id="card-1">
        <div class="card-img-wrap"><img id="img-1" src="" alt=""></div>
        <div class="card-name"><span class="name-main" id="name-main-1"></span><span class="name-sub" id="name-sub-1"></span></div>
      </div>
    </div>
    <!-- bottom row -->
    <div class="card-row single" id="bot-row">
      <div class="card" id="card-2">

  <button class="btn btn-next" onclick="nextRound()">NEXT</button>
</div>

// ─── HELPERS ─────────────────────────────────────────────────
function pickThree() {
  const pool = [...Array(characters.length).keys()];
  const picked = [];
  while (picked.length < 3) {
    const randIndex = Math.floor(Math.random() * pool.length);
    picked.push(pool.splice(randIndex, 1)[0]);
  }
  return picked.map(i => characters[i]);
}

function setCard(index, char) {
  document.getElementById(`img-${index}`).src = `images/${char.file}`;
  document.getElementById(`img-${index}`).alt = char.main;
  document.getElementById(`name-main-${index}`).textContent = char.main;
  document.getElementById(`name-sub-${index}`).textContent = char.sub;
}

function refreshCards() {
  const three = pickThree();
  three.forEach((char, i) => setCard(i, char));
}

// ─── SCREEN TRANSITIONS ──────────────────────────────────────
function startGame() {
  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  refreshCards();
}

function nextRound() {
  refreshCards();
}
